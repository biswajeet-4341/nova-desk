        <header>
            <div class="title">
                <h1>NovaDesk</h1>
            </div>

            <div class="control">
                <button class="theme-toggle">
                    <svg
                        class="theme-icon theme-icon--sun"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />

                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>

                    <svg
                        class="theme-icon theme-icon--moon"
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <span id="theme-label">Light mode</span>
                </button>
            </div>
        </header>

        <main>
            <div class="date-time glass">
                <div class="calender">
                    <h4>GOOD <span id="hour-day">EVENING</span>!</h4>
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        height="24px"
                        viewBox="0 -960 960 960"
                        width="24px"
                        fill="#64748b">

                    </svg>
                </div>

                <div>
                    <h1 class="time-display"></h1>
                    <h5 class="date-display"></h5>
                </div>
            </div>

            <div class="weather glass">
                <div class="weather-top">
                    <div class="weather-location">
                        <i class="ri-map-pin-2-fill"></i>
                        <span id="city-name">Fetching...</span>
                    </div>

                    <button class="weather-refresh">
                        <i class="ri-refresh-line"></i>
                    </button>
                </div>

                <div class="weather-main">
                    <img
                        id="weather-icon"
                        src="https://openweathermap.org/img/wn/01d@2x.png"
                        alt="Weather Icon" />

                    <div class="temperature">
                        <h1 id="temperature">--°</h1>

                        <p id="weather-description">Loading...</p>
                    </div>
                </div>

                <div class="weather-info">
                    <div class="weather-item">
                        <span>Feels Like</span>
                        <h4 id="feels-like">--°</h4>
                    </div>

                    <div class="weather-item">
                        <span>Humidity</span>
                        <h4 id="humidity">--%</h4>
                    </div>

                    <div class="weather-item">
                        <span>Wind</span>
                        <h4 id="wind-speed">-- km/h</h4>
                    </div>
                </div>
            </div>

            <div class="daily-goals glass">daily-goals</div>

            <div class="timer glass">timer</div>

            <div class="quote glass">
                <button class="refresh-quote">
                    <svg
                        class="refresh-quote-icon"
                        xmlns="http://www.w3.org/2000/svg"
                        height="24px"
                        viewBox="0 -960 960 960"
                        width="24px"
                        fill="#64748b">
                        <path
                            d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z" />
                    </svg>
                    New Quote
                </button>
                <h2>
                    <i id="quote-display"></i>
                </h2>
                <h4 id="author-display"></h4>
            </div>

            <div class="todo-list glass">todo-list</div>

            <div class="daily-planner glass">daily-planner</div>
        </main>

        <script type="module" src="script.js"></script>
